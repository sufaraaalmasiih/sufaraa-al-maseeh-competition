<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شاشة الجمهور - سفراء المسيح</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root{
      --bg-0:#edf5fb;
      --bg-1:#f8fbff;
      --bg-2:#edf7ee;
      --card:#ffffff;
      --card-2:#f8fbff;
      --line:#cfe2ee;
      --line-2:#bcd6e5;
      --text:#10324a;
      --muted:#5d7b91;
      --blue:#2388c4;
      --blue-2:#1a6ea4;
      --blue-3:#143a5a;
      --green:#84cb2e;
      --green-2:#5b9f15;
      --gold:#f3bc2d;
      --danger:#d95362;
      --shadow:0 18px 54px rgba(18, 58, 89, .10);
      --shadow-soft:0 10px 26px rgba(18, 58, 89, .08);
      --radius-xl:34px;
      --radius-lg:26px;
      --radius-md:18px;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{
      font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 6% 12%, rgba(35,136,196,.14), transparent 24%),
        radial-gradient(circle at 94% 12%, rgba(132,203,46,.16), transparent 26%),
        linear-gradient(135deg,var(--bg-0),var(--bg-1) 45%,var(--bg-2));
    }
    .aud-shell{height:100vh;display:flex;flex-direction:column;gap:14px;padding:20px}
    .aud-header{height:96px;display:grid;grid-template-columns:auto 1fr auto;grid-template-areas:"actions title brand";align-items:center;gap:22px;padding:12px 20px;border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(248,252,255,.86));border:1px solid rgba(207,226,238,.9);backdrop-filter:blur(16px);box-shadow:0 18px 44px rgba(18,58,89,.08);direction:ltr}
    .aud-actions{grid-area:actions;display:flex;align-items:center;gap:10px;justify-self:start;direction:rtl}
    .aud-actions button{border:1px solid #d6e6f1;border-radius:18px;padding:13px 18px;background:linear-gradient(180deg,#ffffff,#eef6fb);box-shadow:0 10px 24px rgba(18,58,89,.07);font-weight:950;color:var(--blue-2);cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}.aud-actions button:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(18,58,89,.10)}
    .aud-brand{grid-area:brand;display:flex;align-items:center;gap:14px;min-width:0;justify-self:end;direction:rtl;padding-inline-start:10px}
    .aud-brand img{width:58px;height:58px;object-fit:contain;border-radius:18px;background:#fff;padding:6px;box-shadow:0 12px 28px rgba(18,58,89,.10)}
    .aud-brand-title{display:flex;flex-direction:column;gap:3px;min-width:0;text-align:right}
    .aud-brand-title strong{font-size:clamp(24px,2vw,36px);line-height:1;color:var(--blue-2);font-weight:1000}
        .aud-brand-title .tagline{font-size:clamp(13px,1vw,17px);line-height:1.15;color:var(--green-2);font-weight:1000}
    .aud-header-info{grid-area:title;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-width:0;padding-inline:10px;direction:rtl;position:relative}
    .aud-header-info small{display:block;font-size:clamp(11px,.78vw,13px);line-height:1.15;color:var(--muted);font-weight:1000;margin-bottom:2px}
    .aud-header-info strong{display:block;font-size:clamp(24px,2.35vw,40px);line-height:1.05;color:var(--blue-2);font-weight:1000;margin-top:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
    .aud-header-info span{display:block;font-size:clamp(11px,.92vw,15px);line-height:1.15;color:var(--muted);font-weight:900;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

    .aud-main{flex:1;min-height:0}
    .aud-stage{position:relative;height:100%;border-radius:var(--radius-xl);background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,255,255,.84));border:1px solid rgba(255,255,255,.6);box-shadow:var(--shadow);padding:22px;overflow:hidden}
    .aud-stage::before{content:"";position:absolute;inset:auto auto -25% -10%;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle, rgba(35,136,196,.08), transparent 60%);pointer-events:none}
    .aud-stage::after{content:"";position:absolute;inset:-16% -8% auto auto;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle, rgba(132,203,46,.10), transparent 62%);pointer-events:none}
    .aud-footer{height:24px;display:flex;align-items:center;justify-content:space-between;padding-inline:8px;font-size:13px;color:var(--muted)}
    .aud-dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);margin-inline-start:8px;box-shadow:0 0 12px rgba(132,203,46,.65)}

    .aud-view{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;min-height:0}
    .aud-view.compact{justify-content:flex-start}
    .aud-stage-chip{display:inline-flex;align-items:center;justify-content:center;margin-inline:auto;margin-bottom:14px;padding:10px 22px;border-radius:999px;background:#eff7ff;border:1px solid var(--line);color:var(--blue);font-size:clamp(18px,1.2vw,22px);font-weight:1000;box-shadow:var(--shadow-soft)}
    .aud-stage-chip.general{background:#eef9df;color:#4f8a10;border-color:#9cd252;box-shadow:0 10px 22px rgba(132,203,46,.14)}

    .aud-hero{align-items:center;justify-content:flex-start;text-align:center;gap:14px;padding-top:18px;overflow:auto}
    .aud-hero-logo{width:min(205px,15vw);height:min(205px,15vw);object-fit:contain;filter:drop-shadow(0 18px 34px rgba(18,58,89,.12));margin-top:4px}
    .aud-kicker{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:8px 18px;border-radius:999px;background:#eef8e3;color:var(--green-2);border:1px solid rgba(132,203,46,.36);font-size:clamp(15px,1vw,18px);font-weight:1000}
    .aud-hero-title{margin:0;font-size:clamp(54px,6.6vw,112px);line-height:1;color:var(--blue)}
    .aud-hero-sub{margin:0;color:var(--muted);font-size:clamp(24px,2vw,42px);font-weight:850}
    .aud-team-chip-wrap{width:min(1360px,96%);display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:10px}
    .aud-team-chip-wrap.dense{gap:10px}
    .aud-team-chip{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:999px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow-soft);font-weight:900;color:var(--text)}
    .aud-team-chip strong{font-size:clamp(18px,1.45vw,28px);line-height:1.1}
    .aud-team-chip small{font-size:clamp(13px,1vw,18px);color:var(--muted);font-weight:850}

    .aud-empty{margin:auto;background:#fff;border:1px solid var(--line);border-radius:24px;padding:20px 24px;color:var(--muted);font-size:clamp(18px,1.4vw,24px);font-weight:900;box-shadow:var(--shadow-soft)}
    .aud-intro-card,.aud-message-card,.aud-count-card{margin:auto;width:min(880px,90%);background:linear-gradient(180deg,#ffffff,#f7fbff);border:1px solid var(--line);border-radius:32px;box-shadow:var(--shadow);padding:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px}
    .aud-message-card.slim{margin:0 auto 16px}
    .aud-stage-index{width:110px;height:110px;border-radius:30px;display:grid;place-items:center;background:linear-gradient(135deg,var(--blue),#34c1d2);color:#fff;font-size:68px;font-weight:1000;box-shadow:0 16px 40px rgba(35,136,196,.20)}
    .aud-intro-card h2,.aud-message-card h2,.aud-count-card h2{margin:0;font-size:clamp(34px,3.8vw,58px);color:var(--blue-2)}
    .aud-intro-card p,.aud-message-card p,.aud-count-card p{margin:0;color:var(--muted);font-size:clamp(18px,1.45vw,26px);font-weight:850;line-height:1.6}
    .aud-count-circle{width:min(220px,16vw);height:min(220px,16vw);border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 32% 28%, #dbf5ff, #6ec2f4 55%, #2a8ecb);border:8px solid rgba(255,255,255,.8);box-shadow:0 20px 54px rgba(35,136,196,.28);font-size:clamp(84px,8vw,148px);font-weight:1000;color:#fff}
    .aud-count-card.compact-reveal{min-height:220px;width:min(520px,88%);padding:24px;gap:12px}
    .aud-count-circle.small{width:110px;height:110px;font-size:58px;border-width:5px}

    .aud-standing-list{flex:1;min-height:0;display:flex;flex-direction:column;gap:12px;overflow:hidden;padding:2px 4px 4px}
    .aud-standing-list.dense{gap:9px}
    .aud-standing-list.ultra-dense{gap:7px}
    .aud-standing-row{display:grid;grid-template-columns:160px minmax(0,1fr) 86px;direction:ltr;align-items:center;gap:14px;min-height:104px;padding:12px;border-radius:28px;background:linear-gradient(180deg,#ffffff,#f9fcff);border:1px solid var(--line);box-shadow:var(--shadow-soft)}
    .aud-standing-row.first{border-color:#f3cf78;background:linear-gradient(180deg,#fffaf0,#f9fcff)}
    .aud-standing-row.second{border-color:#dbe6ee}
    .aud-standing-row.third{border-color:#e8d4b9}
    .aud-standing-row.dense{grid-template-columns:140px minmax(0,1fr) 80px;min-height:88px;padding:10px}
    .aud-standing-row.ultra-dense{grid-template-columns:126px minmax(0,1fr) 72px;min-height:78px;padding:8px}
    .aud-standing-points,.aud-standing-main,.aud-standing-rank{direction:rtl}
    .aud-standing-points{height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;border-radius:22px;background:linear-gradient(180deg,#f2f8fd,#edf5fb);border:1px solid #d9e8f3;padding:6px}
    .aud-standing-points b{font-size:clamp(40px,3vw,64px);line-height:1;color:var(--blue);font-weight:1000}
    .aud-standing-points small,.aud-standing-points em{font-style:normal;font-size:clamp(13px,.95vw,17px);color:var(--muted);font-weight:950;margin-top:4px}
    .aud-standing-row.dense .aud-standing-points b{font-size:clamp(34px,2.6vw,48px)}
    .aud-standing-row.ultra-dense .aud-standing-points b{font-size:clamp(28px,2.2vw,42px)}
    .aud-standing-main{height:100%;display:flex;flex-direction:column;justify-content:center;border-radius:24px;padding:10px 14px;background:#fbfdff;border:1px solid #e5eff6}
    .aud-standing-name-wrap strong{display:block;font-size:clamp(28px,2vw,42px);line-height:1.08;color:var(--text);font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .aud-standing-name-wrap span{display:block;font-size:clamp(14px,1vw,18px);line-height:1.15;color:var(--muted);font-weight:900;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .aud-standing-bar{height:12px;border-radius:999px;background:#e4eff6;overflow:hidden;margin-top:12px}
    .aud-standing-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),#8fd630)}
    .aud-standing-rank{width:74px;height:74px;border-radius:24px;display:grid;place-items:center;background:linear-gradient(180deg,#2e93d0,#2388c4);color:#fff;font-size:clamp(28px,2vw,40px);font-weight:1000}
    .aud-standing-row.dense .aud-standing-rank{width:66px;height:66px;border-radius:22px}
    .aud-standing-row.ultra-dense .aud-standing-rank{width:58px;height:58px;border-radius:20px}
    .aud-standing-row.dense .aud-standing-name-wrap strong{font-size:clamp(22px,1.6vw,34px)}
    .aud-standing-row.dense .aud-standing-name-wrap span{font-size:clamp(12px,.95vw,16px)}
    .aud-standing-row.ultra-dense .aud-standing-name-wrap strong{font-size:clamp(18px,1.35vw,28px)}
    .aud-standing-row.ultra-dense .aud-standing-name-wrap span{font-size:clamp(11px,.85vw,14px)}

    .aud-stage-qa-shell{flex:1;display:flex;flex-direction:column;min-height:0;gap:16px}
    .aud-question-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;margin:0 auto;width:min(1320px,95%);padding:28px 28px 20px;border-radius:30px;background:linear-gradient(180deg,#ffffff,#f9fcff);border:1px solid var(--line);box-shadow:var(--shadow-soft);text-align:center}
    .aud-question-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
    .aud-question-meta span{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:10px 18px;border-radius:999px;background:#eef7ff;border:1px solid var(--line);color:var(--blue-2);font-size:clamp(15px,1vw,18px);font-weight:1000}
    .aud-question-screen h2{margin:0;color:var(--text);font-size:clamp(42px,4vw,76px);line-height:1.28;max-width:1180px}
    .aud-status-note{margin:0 auto;display:flex;align-items:center;justify-content:center;width:min(800px,90%);min-height:92px;padding:18px 24px;border-radius:26px;background:linear-gradient(180deg,#ffffff,#f9fcff);border:1px solid var(--line);box-shadow:var(--shadow-soft);text-align:center;color:var(--muted);font-size:clamp(20px,1.35vw,26px);font-weight:950}
    .aud-timer-badge{display:inline-flex;align-items:center;justify-content:center;min-width:220px;min-height:92px;padding:16px 28px;border-radius:28px;background:linear-gradient(180deg,var(--blue-3),#205c8a);color:#fff;font-size:clamp(44px,4vw,70px);font-weight:1000;box-shadow:0 16px 36px rgba(20,58,90,.24);direction:ltr}
    .aud-timer-badge.danger{background:linear-gradient(180deg,#e35d67,#c53a46)}
    .aud-results-shell{flex:1;min-height:0;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;padding-top:4px}
    .aud-answer-grid{width:100%;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,340px));justify-content:center;align-content:start;gap:16px;padding:4px 6px 10px;overflow:auto}
    .aud-answer-grid.dense{grid-template-columns:repeat(auto-fit,minmax(240px,280px));gap:14px}
    .aud-answer-grid.compact{grid-template-columns:repeat(auto-fit,minmax(205px,235px));gap:12px}
    .aud-answer-card{min-height:176px;border-radius:28px;background:linear-gradient(180deg,#ffffff,#f8fbff);border:1px solid var(--line);box-shadow:var(--shadow-soft);padding:20px 18px 18px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:8px}
    .aud-answer-card strong{font-size:clamp(26px,1.8vw,34px);line-height:1.12;color:var(--text)}
    .aud-answer-card span{font-size:clamp(22px,1.55vw,30px);line-height:1.25;color:#0f3048;font-weight:1000;min-height:54px;display:flex;align-items:center;justify-content:center}
    .aud-answer-card b{font-size:clamp(48px,3vw,68px);line-height:1;color:var(--blue-2);font-weight:1000}
    .aud-answer-card small{font-size:clamp(15px,1vw,19px);line-height:1.1;color:var(--muted);font-weight:950}
    .aud-answer-card.ok{background:linear-gradient(180deg,#f5fff0,#ffffff);border-color:rgba(132,203,46,.48)}
    .aud-answer-card.ok b{color:var(--green-2)}
    .aud-answer-card.bad{background:linear-gradient(180deg,#fff5f6,#ffffff);border-color:rgba(217,83,98,.42)}
    .aud-answer-card.bad b{color:var(--danger)}
    .aud-answer-card.neutral{background:linear-gradient(180deg,#f4fbff,#ffffff)}
    .aud-answer-grid.dense .aud-answer-card{min-height:148px;border-radius:24px;padding:16px 14px}
    .aud-answer-grid.compact .aud-answer-card{min-height:126px;border-radius:22px;padding:14px 12px}
    .aud-answer-grid.dense .aud-answer-card strong{font-size:clamp(22px,1.45vw,28px)}
    .aud-answer-grid.compact .aud-answer-card strong{font-size:clamp(19px,1.2vw,24px)}
    .aud-answer-grid.dense .aud-answer-card span{font-size:clamp(18px,1.18vw,24px);min-height:42px}
    .aud-answer-grid.compact .aud-answer-card span{font-size:clamp(15px,1vw,19px);min-height:36px}
    .aud-answer-grid.dense .aud-answer-card b{font-size:clamp(38px,2.35vw,52px)}
    .aud-answer-grid.compact .aud-answer-card b{font-size:clamp(32px,2vw,42px)}
    .aud-answer-grid.compact .aud-answer-card small{font-size:clamp(13px,.9vw,16px)}

    .stage3-final-card.audience-stage-card{width:min(1480px,98%);margin:0 auto;padding:clamp(18px,1.8vw,28px);border-radius:30px;border:1px solid rgba(36,126,184,.16);background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(246,252,255,.94));box-shadow:0 24px 70px rgba(12,68,110,.12)}
    .stage3-final-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .stage3-final-title h2{margin:0;font-size:clamp(36px,3vw,62px);color:var(--blue-2)}
    .stage3-final-title p{margin:8px 0 0;color:var(--muted);font-size:clamp(18px,1.25vw,24px);font-weight:900}
    .stage3-final-head-side{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .stage3-final-turn{display:inline-flex;align-items:center;gap:10px;padding:14px 18px;border-radius:999px;background:#eaf6ff;color:var(--blue-2);font-size:clamp(20px,1.4vw,28px);font-weight:1000;white-space:nowrap}
    .stage3-final-timer{display:inline-flex;align-items:center;justify-content:center;min-width:128px;padding:14px 18px;border-radius:22px;background:var(--blue-3);color:#fff;font-size:clamp(28px,2vw,40px);font-weight:1000;direction:ltr}
    .stage3-final-timer.danger{background:var(--danger)}
    .stage3-final-board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;width:100%}
    .stage3-final-col{min-width:0;border-radius:24px;background:rgba(255,255,255,.96);border:1px solid rgba(36,126,184,.14);padding:12px;box-shadow:0 12px 34px rgba(19,84,128,.08)}
    .stage3-final-col h3{margin:0 0 10px;text-align:center;color:#174f76;font-size:clamp(18px,1.4vw,24px)}
    .stage3-final-qbtn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;border:0;border-radius:16px;padding:11px 12px;margin:7px 0;background:linear-gradient(135deg,#0ea5e9,#2563eb);color:#fff;font-size:clamp(15px,1vw,18px);font-weight:1000;box-shadow:0 8px 18px rgba(37,99,235,.20);opacity:1}
    .stage3-final-qbtn:disabled{cursor:default}
    .stage3-final-qbtn.used{background:#cbd5e1;color:#475569;box-shadow:none}
    .stage3-final-qbtn .pts{background:rgba(255,255,255,.18);border-radius:999px;padding:4px 8px;font-size:.9rem}
    .stage3-final-qbtn.active-admin{background:linear-gradient(135deg,#ffe28b,#f3bc2d);color:#4c3a00;border:1px solid #dfb021;box-shadow:0 12px 22px rgba(243,188,45,.22)}

    .aud-podium{margin:auto auto 4px;width:min(1160px,94%);display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:18px;align-items:end}
    .aud-podium-place{min-height:320px;border-radius:30px;background:linear-gradient(180deg,#ffffff,#f7fbff);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:24px;text-align:center}
    .aud-podium-place.place-1{min-height:430px;background:linear-gradient(180deg,#fff6d8,#ffffff);border-color:rgba(243,188,45,.52)}
    .aud-podium-place.place-2{min-height:370px}
    .aud-podium-place.place-3{min-height:340px}
    .aud-podium-medal{font-size:clamp(52px,5vw,80px);margin-bottom:10px}
    .aud-podium-place strong{font-size:clamp(24px,2vw,42px);line-height:1.08;color:var(--text)}
    .aud-podium-place span{margin-top:6px;color:var(--muted);font-size:clamp(13px,1vw,17px);font-weight:900}
    .aud-podium-place b{margin-top:16px;color:var(--blue);font-size:clamp(40px,4vw,80px);line-height:1}
    .aud-podium-place small{margin-top:8px;color:#816100;font-size:clamp(15px,1.1vw,21px);font-weight:1000}

    @media (max-width:1200px){
      .stage3-final-board{grid-template-columns:repeat(3,minmax(0,1fr))}
      .aud-standing-row{grid-template-columns:146px minmax(0,1fr) 80px}
      .aud-answer-grid{grid-template-columns:repeat(auto-fit,minmax(210px,240px))}
    }
    @media (max-width:900px){
      .aud-shell{padding:14px}
      .aud-header{height:auto;grid-template-columns:1fr;grid-template-areas:"brand" "title" "actions";gap:10px;direction:rtl;padding:14px 16px}
      .aud-actions{width:100%;justify-content:flex-start;justify-self:auto}
      .aud-header-info{align-items:flex-start;text-align:right;justify-self:auto}
      .aud-stage{padding:16px}
      .aud-standing-row,.aud-standing-row.dense,.aud-standing-row.ultra-dense{grid-template-columns:118px minmax(0,1fr) 64px;gap:10px}
      .stage3-final-head{flex-direction:column;align-items:stretch}
      .stage3-final-head-side{justify-content:space-between}
      .stage3-final-board{grid-template-columns:repeat(2,minmax(0,1fr))}
      .aud-answer-grid,.aud-answer-grid.dense,.aud-answer-grid.compact{grid-template-columns:repeat(2,minmax(0,1fr))}
      .aud-podium{grid-template-columns:1fr}
      .aud-podium-place,.aud-podium-place.place-1,.aud-podium-place.place-2,.aud-podium-place.place-3{min-height:240px}
      .aud-footer{display:none}
    }
